<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="waterGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38BDF8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0369A1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dropGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7DD3FC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0284C7;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Lingkaran background -->
  <circle cx="50" cy="50" r="48" fill="url(#waterGrad)" />
  <!-- Tetes air besar -->
  <path d="M50 15 C50 15 28 42 28 57 C28 70 38 80 50 80 C62 80 72 70 72 57 C72 42 50 15 50 15 Z"
        fill="url(#dropGrad)" />
  <!-- Highlight/kilap di tetes air -->
  <ellipse cx="42" cy="50" rx="5" ry="9" fill="white" opacity="0.35" transform="rotate(-20,42,50)" />
  <!-- Gelombang kecil di bawah -->
  <path d="M30 82 Q40 77 50 82 Q60 87 70 82" stroke="white" stroke-width="2.5" fill="none" opacity="0.6" stroke-linecap="round"/>
</svg>
